<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sheet Link Router Builder</title>
    <style>
      :root {
        --bg: #f5f7f6;
        --surface: #ffffff;
        --ink: #17211c;
        --muted: #68756f;
        --line: #dce4df;
        --primary: #0f7b5f;
        --primary-dark: #095844;
        --danger: #a33f3f;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: Arial, system-ui, sans-serif;
      }

      main {
        width: min(980px, calc(100% - 28px));
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      header {
        margin-bottom: 18px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.5rem, 4vw, 2.2rem);
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.55;
      }

      section {
        margin-top: 14px;
        padding: 18px;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 12px 30px rgba(23, 33, 28, 0.08);
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-weight: 700;
      }

      input[type="text"],
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--ink);
        background: #fff;
        font: inherit;
      }

      input[type="text"] {
        min-height: 44px;
        padding: 0 12px;
      }

      input[type="file"] {
        width: 100%;
        padding: 14px;
        border: 1px dashed #aebbb4;
        border-radius: 8px;
        background: #fbfcfb;
      }

      textarea {
        min-height: 170px;
        padding: 12px;
        resize: vertical;
      }

      .grid {
        display: grid;
        gap: 12px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }

      button {
        min-height: 44px;
        padding: 0 16px;
        border: 0;
        border-radius: 8px;
        background: var(--primary);
        color: #fff;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      button.secondary {
        background: #e9efec;
        color: var(--primary-dark);
      }

      .status {
        margin-top: 12px;
        color: var(--muted);
        font-weight: 700;
      }

      .status.error {
        color: var(--danger);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 12px;
        font-size: 0.92rem;
      }

      th,
      td {
        padding: 10px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
        overflow-wrap: anywhere;
      }

      th {
        color: var(--muted);
        background: #f8faf9;
      }

      @media (max-width: 680px) {
        section { padding: 14px; }
        .actions button { flex: 1 1 100%; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Sheet Link Router Builder</h1>
        <p>Upload or paste a CSV containing each person name and Google Sheets link. The tool creates the final web-app URL for each person.</p>
      </header>

      <section class="grid">
        <div>
          <label for="baseLink">Deployment link prefix</label>
          <input id="baseLink" type="text" value="https://script.google.com/macros/s/AKfycbz1bl7FrVdSppiWCNEYcdQh89QimPyixWbZTzBIeMS0GIcIuz7EigvKbLDX7RyIoHDs/exec?sheet_id=">
        </div>

        <div>
          <label for="csvFile">CSV file</label>
          <input id="csvFile" type="file" accept=".csv,text/csv">
        </div>

        <div>
          <label for="csvInput">CSV text</label>
          <textarea id="csvInput" placeholder="name,sheet_link&#10;Marwan Tamer,https://docs.google.com/spreadsheets/d/SPREADSHEET_ID/edit"></textarea>
        </div>

        <div class="actions">
          <button id="convertButton" type="button">Generate links</button>
          <button id="downloadButton" class="secondary" type="button" disabled>Download result CSV</button>
          <button id="copyButton" class="secondary" type="button" disabled>Copy result CSV</button>
        </div>

        <div id="status" class="status">Waiting for CSV input.</div>
      </section>

      <section>
        <label for="csvOutput">Result CSV</label>
        <textarea id="csvOutput" readonly></textarea>
        <div id="preview"></div>
      </section>
    </main>

    <script>
      const DEFAULT_LINK_COLUMN_NAMES = ['sheet_link', 'sheet url', 'sheet_url', 'url', 'link', 'spreadsheet', 'spreadsheet_url'];
      const DEFAULT_NAME_COLUMN_NAMES = ['name', 'person', 'person_name', 'user', 'user_name', 'student', 'student_name', 'الاسم', 'اسم', 'اسم المستخدم'];
      const csvFile = document.getElementById('csvFile');
      const csvInput = document.getElementById('csvInput');
      const csvOutput = document.getElementById('csvOutput');
      const baseLink = document.getElementById('baseLink');
      const statusBox = document.getElementById('status');
      const preview = document.getElementById('preview');
      const downloadButton = document.getElementById('downloadButton');
      const copyButton = document.getElementById('copyButton');

      document.getElementById('convertButton').addEventListener('click', convertCsv);
      downloadButton.addEventListener('click', downloadCsv);
      copyButton.addEventListener('click', copyCsv);

      csvFile.addEventListener('change', async (event) => {
        const file = event.target.files[0];
        if (!file) return;
        csvInput.value = await file.text();
        setStatus(`Loaded ${file.name}.`);
      });

      function convertCsv() {
        try {
          const rows = parseCsv(csvInput.value.trim());
          if (!rows.length) throw new Error('No CSV rows found.');

          const hasHeader = rows[0].some((cell) => DEFAULT_LINK_COLUMN_NAMES.includes(normalize(cell)));
          const headers = hasHeader ? rows[0].slice() : rows[0].map((_, index) => `column_${index + 1}`);
          const dataRows = hasHeader ? rows.slice(1) : rows;
          const linkColumnIndex = findLinkColumn(headers, dataRows);

          if (linkColumnIndex < 0) {
            throw new Error('Could not find a column containing Google Sheets links or IDs.');
          }

          const nameColumnIndex = findNameColumn(headers, dataRows, linkColumnIndex);
          const outputHeaders = ['person_name', 'web_app_link'];
          const outputRows = dataRows
            .filter((row) => row.some((cell) => String(cell || '').trim()))
            .map((row) => {
              const normalizedRow = headers.map((_, index) => row[index] || '');
              const personName = nameColumnIndex >= 0 ? normalizedRow[nameColumnIndex] : '';
              const sheetId = extractSheetId(normalizedRow[linkColumnIndex]);
              const webAppLink = sheetId ? baseLink.value.trim() + sheetId : '';
              return [personName, webAppLink];
            });

          const result = stringifyCsv([outputHeaders].concat(outputRows));
          csvOutput.value = result;
          downloadButton.disabled = false;
          copyButton.disabled = false;
          renderPreview(outputHeaders, outputRows);

          const parsedCount = outputRows.filter((row) => row[1]).length;
          const missingCount = outputRows.length - parsedCount;
          setStatus(`Generated ${parsedCount} links${missingCount ? `, ${missingCount} rows missing sheet IDs` : ''}.`, missingCount > 0);
        } catch (error) {
          csvOutput.value = '';
          preview.innerHTML = '';
          downloadButton.disabled = true;
          copyButton.disabled = true;
          setStatus(error.message || 'Could not process CSV.', true);
        }
      }

      function findLinkColumn(headers, rows) {
        const headerIndex = headers.findIndex((header) => DEFAULT_LINK_COLUMN_NAMES.includes(normalize(header)));
        if (headerIndex >= 0) return headerIndex;

        let bestIndex = -1;
        let bestScore = 0;
        headers.forEach((_, colIndex) => {
          const score = rows.reduce((sum, row) => sum + (extractSheetId(row[colIndex]) ? 1 : 0), 0);
          if (score > bestScore) {
            bestScore = score;
            bestIndex = colIndex;
          }
        });
        return bestIndex;
      }

      function findNameColumn(headers, rows, linkColumnIndex) {
        const headerIndex = headers.findIndex((header) => DEFAULT_NAME_COLUMN_NAMES.includes(normalize(header)));
        if (headerIndex >= 0 && headerIndex !== linkColumnIndex) return headerIndex;

        let bestIndex = -1;
        let bestScore = -1;
        headers.forEach((_, colIndex) => {
          if (colIndex === linkColumnIndex) return;
          const score = rows.reduce((sum, row) => {
            const value = String(row[colIndex] || '').trim();
            if (!value || extractSheetId(value)) return sum;
            return sum + 1;
          }, 0);
          if (score > bestScore) {
            bestScore = score;
            bestIndex = colIndex;
          }
        });
        return bestIndex;
      }

      function extractSheetId(value) {
        const text = String(value || '').trim();
        if (!text) return '';

        const fromUrl = text.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
        if (fromUrl) return fromUrl[1];

        const fromParam = text.match(/[?&]sheet_id=([a-zA-Z0-9-_]+)/);
        if (fromParam) return fromParam[1];

        const idOnly = text.match(/^[a-zA-Z0-9-_]{20,}$/);
        return idOnly ? idOnly[0] : '';
      }

      function parseCsv(text) {
        const rows = [];
        let row = [];
        let cell = '';
        let inQuotes = false;

        for (let index = 0; index < text.length; index++) {
          const char = text[index];
          const next = text[index + 1];

          if (char === '"' && inQuotes && next === '"') {
            cell += '"';
            index++;
          } else if (char === '"') {
            inQuotes = !inQuotes;
          } else if (char === ',' && !inQuotes) {
            row.push(cell);
            cell = '';
          } else if ((char === '\n' || char === '\r') && !inQuotes) {
            if (char === '\r' && next === '\n') index++;
            row.push(cell);
            rows.push(row);
            row = [];
            cell = '';
          } else {
            cell += char;
          }
        }

        row.push(cell);
        rows.push(row);
        return rows.filter((line) => line.some((cellValue) => String(cellValue || '').trim()));
      }

      function stringifyCsv(rows) {
        return rows.map((row) => row.map(escapeCsvCell).join(',')).join('\n');
      }

      function escapeCsvCell(value) {
        const text = String(value || '');
        return /[",\n\r]/.test(text) ? `"${text.replaceAll('"', '""')}"` : text;
      }

      function renderPreview(headers, rows) {
        const visibleRows = rows.slice(0, 8);
        preview.innerHTML = `
          <table>
            <thead>
              <tr><th>Person name</th><th>Web app link</th></tr>
            </thead>
            <tbody>
              ${visibleRows.map((row) => `
                <tr>
                  <td>${escapeHtml(row[0])}</td>
                  <td>${escapeHtml(row[1])}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      }

      function downloadCsv() {
        const blob = new Blob([csvOutput.value], { type: 'text/csv;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = 'sheet-web-app-links.csv';
        link.click();
        URL.revokeObjectURL(url);
      }

      async function copyCsv() {
        await navigator.clipboard.writeText(csvOutput.value);
        setStatus('Result CSV copied.');
      }

      function setStatus(message, isError = false) {
        statusBox.textContent = message;
        statusBox.classList.toggle('error', isError);
      }

      function normalize(value) {
        return String(value || '').trim().toLowerCase();
      }

      function escapeHtml(value) {
        return String(value || '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }
    </script>
  </body>
</html>
