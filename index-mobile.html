<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>جدول محاسبة</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#1D9E75;--teal-mid:#5DCAA5;--teal-dark:#085041;--teal-bg:#e8f8f2;
  --text:#1a1a1a;--muted:#5a5a5a;--hint:#999;
  --bg:#f0f0ee;--card:#ffffff;
  --br:rgba(0,0,0,.10);--brm:rgba(0,0,0,.20);
  --r:16px;
}
body{font-family:-apple-system,"Segoe UI",Tahoma,sans-serif;background:var(--bg);color:var(--text);padding-bottom:130px;font-size:17px}

.hdr{background:var(--card);border-bottom:1px solid var(--br);padding:22px 20px 16px;text-align:center;position:sticky;top:0;z-index:10}
.hdr h1{font-size:26px;font-weight:700;letter-spacing:-.3px}
.pill{display:inline-block;margin-top:8px;font-size:14px;color:var(--muted);background:var(--bg);border:1px solid var(--brm);border-radius:30px;padding:5px 18px}

.pw{padding:18px 18px 0}
.pt{display:flex;justify-content:space-between;font-size:15px;color:var(--muted);margin-bottom:8px}
.pt b{color:var(--teal-dark);font-size:17px;font-weight:700}
.trk{height:10px;background:rgba(0,0,0,.08);border-radius:100px;overflow:hidden}
.fil{height:100%;background:var(--teal);border-radius:100px;transition:width .4s ease;width:0}

.sl{font-size:13px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.1em;padding:22px 18px 10px}

.cards{padding:0 14px;display:flex;flex-direction:column;gap:12px}
.card{background:var(--card);border:1px solid var(--br);border-radius:var(--r);padding:18px 18px 16px;transition:border-color .2s,background .2s}
.card.on{border-color:var(--teal-mid);border-width:1.5px;background:var(--teal-bg)}

.ct{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:12px}
.cl{font-size:18px;font-weight:600;line-height:1.2}
.cs{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.5}
.card.on .cl{color:var(--teal-dark)}
.card.on .cs{color:#2d7a5a}

.bdg{
  min-width:48px;height:48px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:700;
  background:var(--bg);color:var(--muted);
  border:2px solid var(--brm);
  transition:all .2s;flex-shrink:0;
}
.card.on .bdg{background:var(--teal);color:#fff;border-color:var(--teal)}
.bdg.mx{background:var(--teal-dark)!important;border-color:var(--teal-dark)!important;color:#fff!important}

input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:8px;border-radius:100px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:var(--teal);border:3px solid #fff;box-shadow:0 0 0 2px var(--teal);cursor:pointer}
input[type=range]::-moz-range-thumb{width:26px;height:26px;border-radius:50%;background:var(--teal);border:3px solid #fff;cursor:pointer}
.mks{display:flex;justify-content:space-between;padding:5px 3px 0}
.mks span{font-size:12px;color:var(--hint);font-weight:500}

.foot{padding:24px 18px 8px}
.btn{
  width:100%;padding:20px;
  background:var(--teal);color:#fff;border:none;
  border-radius:var(--r);font-size:19px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
  -webkit-tap-highlight-color:transparent;
  transition:opacity .15s,background .2s;
  letter-spacing:.2px;
}
.btn:active{opacity:.82}
.btn:disabled{background:#aaa;cursor:not-allowed}
.btn.done{background:var(--teal-dark)}

.toast{
  position:fixed;bottom:32px;left:50%;
  transform:translateX(-50%) translateY(24px);
  background:#1a1a1a;color:#fff;
  padding:14px 28px;border-radius:100px;
  font-size:16px;opacity:0;transition:all .3s;
  pointer-events:none;white-space:nowrap;z-index:999;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:#c0392b}
</style>
</head>
<body>

<div class="hdr">
  <h1>🕌 جدول محاسبة</h1>
  <div class="pill" id="dl">...</div>
</div>

<div class="pw">
  <div class="pt"><span>إجمالي اليوم</span><b id="tl">0 / 90</b></div>
  <div class="trk"><div class="fil" id="fil"></div></div>
</div>

<div class="sl">العبادات اليومية</div>
<div class="cards" id="cc"></div>

<div class="foot">
  <button class="btn" id="sb" onclick="doSave()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
      <polyline points="17 21 17 13 7 13 7 21"/>
      <polyline points="7 3 7 8 15 8"/>
    </svg>
    حفظ في Google Sheets
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
var TASKS = [
  {key:"dua",       label:"الدعاء",        sub:"15 دقيقة"},
  {key:"istighfar", label:"الاستغفار",      sub:"100 صباحاً ومساءً"},
  {key:"tawbah",    label:"التوبة",         sub:"توبة من ذنب واحد"},
  {key:"dhikr",     label:"الذكر",          sub:"سيد الاستغفار + سبحان الله 100 + لا إله إلا الله 100"},
  {key:"jama",      label:"صلاة الجماعة",   sub:"في المسجد"},
  {key:"nawafil",   label:"السنن الرواتب",  sub:""},
  {key:"qiyam",     label:"قيام الليل",     sub:"الوتر + ركعتان (ربع أو 100 آية)"},
  {key:"quran",     label:"ورد القرآن",      sub:"جزء"},
  {key:"tadabbur",  label:"تدبر القرآن",    sub:"10 – 15 دقيقة"}
];

var scores = {};
TASKS.forEach(function(t){ scores[t.key] = 0; });

var cc = document.getElementById("cc");
TASKS.forEach(function(t) {
  var d = document.createElement("div");
  d.className = "card";
  d.id = "c-" + t.key;
  d.innerHTML =
    '<div class="ct">' +
      '<div style="flex:1">' +
        '<div class="cl">' + t.label + '</div>' +
        (t.sub ? '<div class="cs">' + t.sub + '</div>' : '') +
      '</div>' +
      '<div class="bdg" id="b-' + t.key + '">0</div>' +
    '</div>' +
    '<input type="range" min="0" max="10" step="1" value="0" id="s-' + t.key + '" ' +
      'oninput="slide(\'' + t.key + '\', parseInt(this.value))">' +
    '<div class="mks"><span>10</span><span>5</span><span>0</span></div>';
  cc.appendChild(d);
  setBg(document.getElementById("s-" + t.key), 0);
});

function slide(key, v) {
  scores[key] = v;
  var badge = document.getElementById("b-" + key);
  var card  = document.getElementById("c-" + key);
  badge.textContent = v;
  badge.className = "bdg" + (v === 10 ? " mx" : "");
  card.className  = "card" + (v > 0 ? " on" : "");
  setBg(document.getElementById("s-" + key), v);
  updateTot();
}

function setBg(el, v) {
  var p = (v / 10) * 100;
  el.style.background = "linear-gradient(to left, var(--teal) " + p + "%, #ddd " + p + "%)";
}

function updateTot() {
  var total = 0;
  TASKS.forEach(function(t){ total += scores[t.key]; });
  document.getElementById("tl").textContent = total + " / 90";
  document.getElementById("fil").style.width = (total / 90 * 100) + "%";
}

(function() {
  var days = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
  var now  = new Date();
  var ms   = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  document.getElementById("dl").textContent =
    days[now.getDay()] + " · " + now.getDate() + "-" + ms[now.getMonth()] + "-" + now.getFullYear();
})();

function doSave() {
  var btn = document.getElementById("sb");
  btn.disabled = true;
  btn.innerHTML =
    '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
    '<circle cx="12" cy="12" r="10"/></svg> جاري الحفظ…';

  google.script.run
    .withSuccessHandler(function(msg) {
      btn.classList.add("done");
      btn.innerHTML =
        '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">' +
        '<polyline points="20 6 9 17 4 12"/></svg> ' + msg;
      showToast("✓ " + msg, false);
    })
    .withFailureHandler(function(err) {
      btn.disabled = false;
      btn.innerHTML =
        '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
        '<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>' +
        '<polyline points="17 21 17 13 7 13 7 21"/>' +
        '<polyline points="7 3 7 8 15 8"/></svg> حفظ في Google Sheets';
      showToast("خطأ: " + err.message, true);
    })
    .saveScores(scores);
}

function showToast(msg, isErr) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast" + (isErr ? " err" : "") + " show";
  setTimeout(function(){ t.className = "toast"; }, 3200);
}
</script>
</body>
</html>
